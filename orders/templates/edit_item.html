<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
</head>
<body>

<h1>Edit Item ✏️</h1>

<form action="edit/{{item.id}}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Name:</label>
    <input type="text" name="name" value="{{ item.name }}"><br><br>

    <label>Price:</label>
    <input type="number" name="price" value="{{ item.price }}"><br><br>

    <label>Image:</label>
    <input type="file" name="image">

    <button type="submit">Update</button>
</form>

</body>
</html>
