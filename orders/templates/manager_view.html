<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .row{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            align-items: center;
            margin: 30px;
        }
    </style>
</head>
<body>
    <div class="row">
        <h3>Name</p>
        <h3>Price</p>
        <h3>Type</p>
        <h3>Actions</p>
    </div>
    {% for item in items %}
        <div class="row">
            <p>{{item.name}}</p>
            <p>{{item.price}}</p>
            <p>{{item.type}}</p>
            <div>
                <button>edit</button>
                <form action="delete/{{item.id}}" method="POST">
                    {% csrf_token %}
                    <button type="submit">delete</button>
                </form>
            </div>
            
        </div>
    {% endfor %}
    <a href = "add">Add Food Items</a>
</body>
</html>
