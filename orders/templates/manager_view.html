<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Panel</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .headerRow, .itemRow {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 2fr;
            align-items: center;
            justify-items: center;
            border: 1px solid #bff1ef;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .headerRow {
            font-weight: bold;
            background-color: #f5f5f5;
        }

        .itemRow {
            background-color: #fafafa;
        }

        .actionMenu {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 6px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .editBtn {
            background-color: orange;
            color: white;
        }

        .deleteBtn {
            background-color: red;
            color: white;
        }

        .editBtn:hover {
            background-color: darkorange;
        }

        .deleteBtn:hover {
            background-color: darkred;
        }

        .addBtn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .addBtn:hover {
            background-color: darkgreen;
        }

        .back {
            text-decoration: none;
            background-color: green;
            border-radius: 10px;
            padding: 10px;
            padding-left: 20px;
            padding-right: 20px;
            color: rgb(255, 255, 255);
            margin-bottom: 10px;
            display: inline-block;
        }

    </style>
</head>

<body>
    <a href = '/' class="back"><= Back</a>

    <h1>Manager Panel 📋</h1>

    <!-- Header -->
    <div class="headerRow">
        <div>Name</div>
        <div>Price</div>
        <div>Category</div>
        <div>Actions</div>
    </div>

    <!-- Items -->
    {% for item in items %}
        <div class="itemRow">
            <div>{{ item.name }}</div>
            <div>₹{{ item.price }}</div>
            <div>{{ item.category.name }}</div>

            <div class="actionMenu">
                
                <!-- ✅ Edit (GET request, not POST) -->
                <a href="/open_edit/{{ item.id }}">
                    <button class="editBtn">Edit</button>
                </a>

                <!-- ✅ Delete -->
                <form action="/delete/{{ item.id }}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="deleteBtn">Delete</button>
                </form>

            </div>
        </div>
    {% empty %}
        <p>No items available</p>
    {% endfor %}

    <!-- Add Button -->
    <a href="/add" class="addBtn">➕ Add Food Item</a>

</body>
</html>
