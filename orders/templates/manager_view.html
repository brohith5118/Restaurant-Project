<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .headerRow{
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 2fr;
            align-items: center;
            justify-items: center;
            border: 1px solid #bff1ef;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 8px;
            margin-top: 50px;
        }
        .itemRow{
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 2fr;
            align-items: center;
            justify-items: center;
            border: 1px solid #bff1ef;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .actionMenu{
            display: flex;
            justify-content: space-around;
        }
    </style>
</head>
<body>
    <div class="headerRow">
        <h3>Name</p>
        <h3>Price</p>
        <h3>Type</p>
        <h3>Actions</p>
    </div>
    {% for item in items %}
        <div class="itemRow">
            <p>{{item.name}}</p>
            <p>{{item.price}}</p>
            <p>{{item.type}}</p>
            <div class="actionMenu">
                <form action="open_edit/{{item.id}}" method="POST">
                    {% csrf_token %}
                    <button type="submit">edit</button>
                </form>
                <form action="delete/{{item.id}}" method="POST">
                    {% csrf_token %}
                    <button type="submit">delete</button>
                </form>
            </div>
            
        </div>
    {% endfor %}
    <a href = "add">Add Food Items</a>
</body>
</html>
