<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .itemsContainer{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .itemBox{
            background-color: aliceblue;
            border-radius: 10px;
            width: 100%;
            min-height: 200px;
            max-width: 220px;     
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @media (max-width: 600px) {
        .itemsContainer {
            gap: 15px;
            padding: 10px;
        }

        .itemBox {
            max-width: 100%;       /* full width on small screens */
        }
    }

        @media (max-width: 900px) {
            .itemBox {
                max-width: 45%;        /* 2 items per row */
            }
        }
    </style>
</head>
<body>
    <p>login as <a href="manager_view">manager</a></p>
    <div class='itemsContainer'>
        {% for item in items %}
            <div class="itemBox">
                <p>{{item.name}}</p>
                <p>{{item.price}}</p>
                <p>{{item.type}}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
